<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF ↔ Word Converter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8eaf0;
    --muted: #6b7280;
    --success: #34d399;
    --error: #f87171;
    --radius: 16px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 36px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  h1 { font-size: 22px; font-weight: 700; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; margin-top: 4px; }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(108, 99, 255, 0.06);
  }
  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .drop-icon {
    font-size: 44px;
    margin-bottom: 12px;
    display: block;
    transition: transform 0.2s;
  }
  .drop-zone:hover .drop-icon { transform: translateY(-4px); }

  .drop-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .drop-sub { font-size: 13px; color: var(--muted); }
  .drop-sub span {
    color: var(--accent);
    font-weight: 500;
  }

  /* File preview */
  .file-preview {
    display: none;
    align-items: center;
    gap: 12px;
    background: rgba(108,99,255,0.08);
    border: 1px solid rgba(108,99,255,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 16px;
  }
  .file-preview.show { display: flex; }
  .file-icon { font-size: 28px; flex-shrink: 0; }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .file-remove {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 18px; padding: 2px 6px;
    border-radius: 6px; transition: all 0.15s;
  }
  .file-remove:hover { color: var(--error); background: rgba(248,113,113,0.1); }

  /* Convert button */
  .btn-convert {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: white;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-convert:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(108,99,255,0.35);
  }
  .btn-convert:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Progress */
  .progress-wrap {
    display: none;
    margin-top: 20px;
  }
  .progress-wrap.show { display: block; }
  .progress-bar-bg {
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.3s;
    animation: shimmer 1.5s infinite;
    background-size: 200% 100%;
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .progress-label { font-size: 13px; color: var(--muted); margin-top: 8px; text-align: center; }

  /* Result */
  .result {
    display: none;
    margin-top: 20px;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .result.show { display: block; }
  .result.success { background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.2); }
  .result.error { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); }

  .result-icon { font-size: 32px; margin-bottom: 8px; }
  .result-msg { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .result-sub { font-size: 12px; color: var(--muted); margin-bottom: 14px; }

  .btn-download {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px;
    border-radius: 8px;
    background: var(--success);
    color: #0f1117;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    transition: all 0.2s;
  }
  .btn-download:hover { opacity: 0.85; transform: translateY(-1px); }

  .btn-again {
    display: inline-block;
    margin-top: 10px;
    font-size: 13px;
    color: var(--accent);
    cursor: pointer;
    background: none; border: none; font-family: inherit;
    text-decoration: underline;
  }

  /* Badges */
  .badges {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 28px;
    justify-content: center;
  }
  .badge {
    font-size: 12px; color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 12px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">📄</div>
    <h1>PDF ↔ Word</h1>
  </div>
  <p class="subtitle">Kéo thả file vào đây để chuyển đổi ngay trên máy bạn</p>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".pdf,.docx,.doc" />
    <span class="drop-icon">☁️</span>
    <div class="drop-title">Kéo thả file vào đây</div>
    <div class="drop-sub">hoặc <span>nhấn để chọn file</span></div>
    <div class="drop-sub" style="margin-top:6px">Hỗ trợ: <strong>.pdf</strong> → .docx &nbsp;|&nbsp; <strong>.docx</strong> → .pdf</div>
  </div>

  <!-- File Preview -->
  <div class="file-preview" id="filePreview">
    <div class="file-icon" id="fileIcon">📄</div>
    <div class="file-info">
      <div class="file-name" id="fileName">file.pdf</div>
      <div class="file-size" id="fileSize">0 KB</div>
    </div>
    <button class="file-remove" id="fileRemove" title="Xoá file">✕</button>
  </div>

  <!-- Convert Button -->
  <button class="btn-convert" id="btnConvert" disabled>
    <span>⚡</span> Chuyển đổi
  </button>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-label" id="progressLabel">Đang xử lý...</div>
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-sub" id="resultSub"></div>
    <div id="resultActions"></div>
    <br>
    <button class="btn-again" id="btnAgain">↩ Chuyển file khác</button>
  </div>

  <div class="badges">
    <span class="badge">🔒 Chạy cục bộ</span>
    <span class="badge">🚫 Không upload lên mạng</span>
    <span class="badge">⚡ Nhanh</span>
  </div>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const filePreview = document.getElementById('filePreview');
  const fileIcon = document.getElementById('fileIcon');
  const fileName = document.getElementById('fileName');
  const fileSize = document.getElementById('fileSize');
  const fileRemove = document.getElementById('fileRemove');
  const btnConvert = document.getElementById('btnConvert');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  const progressLabel = document.getElementById('progressLabel');
  const result = document.getElementById('result');
  const resultIcon = document.getElementById('resultIcon');
  const resultMsg = document.getElementById('resultMsg');
  const resultSub = document.getElementById('resultSub');
  const resultActions = document.getElementById('resultActions');
  const btnAgain = document.getElementById('btnAgain');

  let selectedFile = null;

  function fmtSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024*1024)).toFixed(1) + ' MB';
  }

  function setFile(file) {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['pdf','docx','doc'].includes(ext)) {
      alert('Chỉ hỗ trợ file .pdf hoặc .docx');
      return;
    }
    selectedFile = file;
    fileIcon.textContent = ext === 'pdf' ? '📕' : '📘';
    fileName.textContent = file.name;
    fileSize.textContent = fmtSize(file.size) + (ext === 'pdf' ? '  →  sẽ ra .docx' : '  →  sẽ ra .pdf');
    filePreview.classList.add('show');
    btnConvert.disabled = false;
    result.classList.remove('show');
    progressWrap.classList.remove('show');
  }

  fileInput.addEventListener('change', () => setFile(fileInput.files[0]));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    setFile(e.dataTransfer.files[0]);
  });

  fileRemove.addEventListener('click', reset);

  function reset() {
    selectedFile = null;
    fileInput.value = '';
    filePreview.classList.remove('show');
    btnConvert.disabled = true;
    result.classList.remove('show');
    progressWrap.classList.remove('show');
    progressBar.style.width = '0%';
  }

  btnAgain.addEventListener('click', reset);

  btnConvert.addEventListener('click', async () => {
    if (!selectedFile) return;

    btnConvert.disabled = true;
    result.classList.remove('show');
    progressWrap.classList.add('show');
    progressLabel.textContent = 'Đang tải file lên...';

    // Animate progress
    let pct = 0;
    const ticker = setInterval(() => {
      pct = Math.min(pct + Math.random() * 8, 88);
      progressBar.style.width = pct + '%';
      if (pct > 30) progressLabel.textContent = 'Đang chuyển đổi...';
      if (pct > 70) progressLabel.textContent = 'Sắp xong...';
    }, 300);

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const res = await fetch('/convert', { method: 'POST', body: formData });
      const data = await res.json();
      clearInterval(ticker);
      progressBar.style.width = '100%';
      progressLabel.textContent = 'Hoàn tất!';

      setTimeout(() => {
        progressWrap.classList.remove('show');
        result.classList.add('show');

        if (data.success) {
          result.className = 'result show success';
          resultIcon.textContent = '✅';
          resultMsg.textContent = `Chuyển đổi thành công → ${data.label}`;
          resultSub.textContent = `Dùng: ${data.method} · ${data.filename}`;
          resultActions.innerHTML = `<a class="btn-download" href="${data.download_url}" download="${data.filename}">⬇️ Tải về ${data.filename}</a>`;
        } else {
          result.className = 'result show error';
          resultIcon.textContent = '❌';
          resultMsg.textContent = 'Chuyển đổi thất bại';
          resultSub.textContent = data.error || 'Vui lòng thử lại.';
          resultActions.innerHTML = '';
          btnConvert.disabled = false;
        }
      }, 500);
    } catch (err) {
      clearInterval(ticker);
      progressWrap.classList.remove('show');
      result.className = 'result show error';
      result.classList.add('show');
      resultIcon.textContent = '❌';
      resultMsg.textContent = 'Lỗi kết nối';
      resultSub.textContent = 'Kiểm tra xem server Flask đang chạy chưa.';
      resultActions.innerHTML = '';
      btnConvert.disabled = false;
    }
  });
</script>
</body>
</html>
